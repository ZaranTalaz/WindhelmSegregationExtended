nexusDescription="Extends Parapets' [url=https://www.nexusmods.com/skyrimspecialedition/mods/21181]Windhelm Segregation - Stay at New Gnisis Cornerclub[/url] so that Argonians are also denied a room at Candlehearth Hall. To find a place to stay, Argonian player characters can befriend Windhelm's Argonian dockworkers (by doing their favour quests or otherwise raising their dispositions to Friend or higher) to receive a key to the Argonian Assemblage. The Argonian Assemblage now includes a bed, chest, and cooking pot for the player. In addition, Nils will also discriminate against dark elves and Argonians if he takes over Candlehearth Hall.\n<br />\n<br />The New Gnisis Cornerclub still only rents rooms to just Dark Elves."
